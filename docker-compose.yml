services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tap_for_good
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d tap_for_good']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
